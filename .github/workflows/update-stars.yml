name: Update Starred Repos

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: "STARRED"
          feed_list: "https://github.com/sudeekshaballanda-hub?tab=stars"
          max_post_count: 6
